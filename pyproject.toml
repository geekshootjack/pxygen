[project]
name = "davinci-proxy-generator"
version = "1.5.2"
description = "Automates proxy generation for DaVinci Resolve"
requires-python = ">=3.9"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py39"
